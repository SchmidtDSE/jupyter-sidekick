name: release

# Build and publish to PyPI when a GitHub Release is published, using PyPI
# Trusted Publishing (OIDC) — no API token is stored anywhere.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/, "pending
# publisher" for the first release):
#   PyPI project name : jupyterlab-acp
#   Owner             : SchmidtDSE
#   Repository name   : jupyterlab-acp
#   Workflow name     : release.yml
#   Environment name  : pypi
on:
  release:
    types: [published]
  pull_request:
    branches: "*"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build sdist + wheel
        run: |
          python -m pip install jupyterlab hatchling hatch-jupyter-builder editables build
          jlpm install
          jlpm build
          python -m build --no-isolation
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Upload to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/jupyterlab-acp
    permissions:
      id-token: write
    steps:
      - name: Get dists artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Upload dists to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
