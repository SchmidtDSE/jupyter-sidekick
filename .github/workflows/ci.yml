name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build tooling (jupyterlab provides jlpm)
        run: |
          python -m pip install --upgrade pip
          pip install jupyterlab

      - name: Build the labextension
        run: |
          jlpm install
          jlpm build:prod

      - name: Install package + test deps
        # The labextension is already built above, so the jupyter-builder hook
        # is skipped (skip-if-exists) and no JS build runs during pip install.
        run: pip install -e ".[test]"

      - name: Verify extensions are discovered
        run: |
          jupyter server extension list 2>&1 | grep -i "jupyter_acp.*OK"
          jupyter labextension list 2>&1 | grep -i "jupyter-acp.*OK"

      - name: Run Python tests
        run: python -m pytest -q
